# ─── Production stack ─────────────────────────────────────────────────────────
#
# Builds and runs the full application.
# In actual production (Cloudflare + Neon + Upstash) you do NOT use this file —
# see deployment.md. Use this for:
#   - self-hosted / VPS-only deployments without managed services
#   - staging environments
#   - smoke testing the Docker images before pushing
#
# Usage:
#   docker compose -f docker-compose.prod.yml up --build -d
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-polish}
      POSTGRES_USER:     ${POSTGRES_USER:-polish}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-polish}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # not exposed externally — only reachable by api service on the internal network

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── MinIO (S3 — skip if using Cloudflare R2 or AWS S3) ──────────────────────
  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Expose port 9000 only if you need external S3 access (e.g. presigned URLs)
    ports:
      - "9000:9000"

  # ── API (Express / Fastify) ──────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV:      production
      PORT:          5000
      DATABASE_URL:  postgres://${POSTGRES_USER:-polish}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-polish}
      REDIS_URL:     redis://:${REDIS_PASSWORD}@redis:6379
      S3_ENDPOINT:   http://minio:9000
      S3_REGION:     us-east-1
      S3_ACCESS_KEY_ID:     ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET:     ${S3_BUCKET:-documents}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000/documents}
      JWT_SECRET:             ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRES_IN:  ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      OPENAI_API_KEY:         ${OPENAI_API_KEY}
      LLM_MODEL:              ${LLM_MODEL:-gpt-4o-mini}
      GOOGLE_CLIENT_ID:       ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET:   ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI:    ${GOOGLE_REDIRECT_URI}
      GITHUB_CLIENT_ID:       ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET:   ${GITHUB_CLIENT_SECRET}
      GITHUB_REDIRECT_URI:    ${GITHUB_REDIRECT_URI}
      APPLE_CLIENT_ID:        ${APPLE_CLIENT_ID}
      APPLE_CLIENT_SECRET:    ${APPLE_CLIENT_SECRET}
      APPLE_REDIRECT_URI:     ${APPLE_REDIRECT_URI}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    restart: always
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  minio_data:

# ─── Required .env file ───────────────────────────────────────────────────────
# Create a .env file in the same directory with these values before running.
# Never commit this file.
#
# POSTGRES_PASSWORD=<strong password>
# REDIS_PASSWORD=<strong password>
# MINIO_ROOT_USER=<username>
# MINIO_ROOT_PASSWORD=<strong password>
# JWT_SECRET=<at least 32 random characters>
# JWT_REFRESH_SECRET=<at least 32 random characters>
# NEXT_PUBLIC_API_URL=https://api.yourdomain.com
# OPENAI_API_KEY=
# GOOGLE_CLIENT_ID=
# GOOGLE_CLIENT_SECRET=
# GOOGLE_REDIRECT_URI=https://api.yourdomain.com/api/oauth/google/callback
# GITHUB_CLIENT_ID=
# GITHUB_CLIENT_SECRET=
# GITHUB_REDIRECT_URI=https://api.yourdomain.com/api/oauth/github/callback
# APPLE_CLIENT_ID=
# APPLE_CLIENT_SECRET=
# APPLE_REDIRECT_URI=https://api.yourdomain.com/api/oauth/apple/callback
