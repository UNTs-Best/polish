# ─── Local development infrastructure ────────────────────────────────────────
#
# Runs only the backing services (Postgres, Redis, MinIO).
# The API and Next.js app run on your host machine with hot reload — no Docker
# needed for them in dev.
#
# Usage:
#   docker compose up -d          # start all services in background
#   docker compose down           # stop and remove containers
#   docker compose down -v        # also wipe volumes (reset all data)
#   docker compose logs -f api    # tail logs for a specific service

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       polish
      POSTGRES_USER:     polish
      POSTGRES_PASSWORD: polish
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polish -d polish"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── MinIO bucket init ────────────────────────────────────────────────────────
  # Runs once on first start to create the default bucket.
  # Remove this service once you have created the bucket manually.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/documents;
        mc anonymous set public local/documents;
        echo 'bucket ready';
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:

# ─── Dev environment variables ───────────────────────────────────────────────
# Copy these into server/.env (do not commit .env files):
#
# DATABASE_URL=postgres://polish:polish@localhost:5432/polish
# REDIS_URL=redis://localhost:6379
# S3_ENDPOINT=http://localhost:9000
# S3_REGION=us-east-1
# S3_ACCESS_KEY_ID=minioadmin
# S3_SECRET_ACCESS_KEY=minioadmin
# S3_BUCKET=documents
# S3_PUBLIC_URL=http://localhost:9000/documents
